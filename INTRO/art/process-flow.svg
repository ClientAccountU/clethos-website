<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" fill="none" role="img" aria-labelledby="pf-title">
  <title id="pf-title">Introductions process steps</title>
  <rect width="480" height="560" rx="20" fill="#f8fafc"/>
  <text x="240" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Four steps · typically days, not months</text>

  <circle cx="56" cy="88" r="20" fill="#22c55e"/>
  <text x="56" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">1</text>
  <rect x="88" y="64" width="360" height="72" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="108" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Discovery &amp; intake</text>
  <text x="108" y="114" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Need, corridors, volume, entity type</text>
  <line x1="56" y1="108" x2="56" y2="148" stroke="#22c55e" stroke-width="2"/>

  <circle cx="56" cy="168" r="20" fill="#22c55e"/>
  <text x="56" y="174" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">2</text>
  <rect x="88" y="144" width="360" height="72" rx="12" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="108" y="172" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#15803d">Fee held in escrow</text>
  <text x="108" y="194" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Upfront · held · not spent until outcome</text>
  <line x1="56" y1="188" x2="56" y2="228" stroke="#22c55e" stroke-width="2"/>

  <circle cx="56" cy="248" r="20" fill="#22c55e"/>
  <text x="56" y="254" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">3</text>
  <rect x="88" y="224" width="360" height="72" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="108" y="252" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Warm introduction</text>
  <text x="108" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Best-fit vetted partner for your lane</text>
  <line x1="56" y1="268" x2="56" y2="308" stroke="#22c55e" stroke-width="2"/>

  <circle cx="56" cy="328" r="20" fill="#22c55e"/>
  <text x="56" y="334" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">4</text>
  <rect x="88" y="304" width="360" height="88" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="108" y="332" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Outcome</text>
  <text x="108" y="354" font-family="system-ui,sans-serif" font-size="11" fill="#15803d">Proceed ’ fee claimed</text>
  <text x="108" y="374" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">No proceed ’ full refund</text>

  <rect x="40" y="420" width="400" height="112" rx="14" fill="#0f172a"/>
  <text x="240" y="452" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f8fafc">You contract with the partner</text>
  <text x="240" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">CLETHOS facilitates the intro  not the regulated provider</text>
  <text x="240" y="504" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Commercial terms sit between you and the partner</text>
</svg>
