<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" fill="none" role="img" aria-labelledby="ifw-title">
  <title id="ifw-title">How CLETHOS Introductions connects you to a vetted partner</title>
  <defs>
    <marker id="ifw-arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="960" height="340" rx="16" fill="#fff"/>

  <text x="480" y="36" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#0f172a">How Introductions connects you</text>

  <!-- Row: You ’ CLETHOS ’ Partner -->
  <rect x="40" y="56" width="240" height="140" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="120" cy="100" r="28" fill="#f3f4f6"/>
  <text x="120" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4b5563">You</text>
  <text x="160" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Your business</text>
  <text x="60" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">Share need · corridor · volume</text>
  <text x="60" y="176" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">Onboarding fee to escrow</text>

  <path d="M280 126h80" stroke="#16a34a" stroke-width="3" marker-end="url(#ifw-arr)"/>

  <rect x="360" y="56" width="240" height="140" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <circle cx="440" cy="100" r="28" fill="#22c55e"/>
  <text x="440" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">C</text>
  <text x="480" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">CLETHOS</text>
  <text x="380" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">Confirm Introductions fit</text>
  <text x="380" y="176" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">Match vetted in-house partner</text>

  <path d="M600 126h80" stroke="#16a34a" stroke-width="3" marker-end="url(#ifw-arr)"/>

  <rect x="680" y="56" width="240" height="140" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="760" cy="100" r="28" fill="#15803d"/>
  <text x="760" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">P</text>
  <text x="800" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Vetted partner</text>
  <text x="700" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">Direct contract &amp; pricing</text>
  <text x="700" y="176" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280">FX · banking · treasury · niche</text>

  <!-- Outcomes -->
  <rect x="40" y="212" width="420" height="108" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="250" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#15803d">Proceed with partner</text>
  <text x="250" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#4b5563">Escrow fee claimed · CLETHOS steps back</text>
  <text x="250" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#4b5563">You operate on partner rails</text>

  <rect x="500" y="212" width="420" height="108" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="710" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#4b5563">No match / no proceed</text>
  <text x="710" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#4b5563">Full onboarding fee refund</text>
  <text x="710" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#4b5563">No further obligation</text>
</svg>
