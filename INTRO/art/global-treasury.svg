<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" fill="none" role="img" aria-labelledby="gt-title">
  <title id="gt-title">CLETHOS treasury stack: collect, treasury, pay via partner network</title>
  <defs>
    <linearGradient id="gt-bg" x1="0" y1="0" x2="640" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="gt-hub" x1="260" y1="140" x2="380" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <marker id="gt-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="640" height="520" rx="20" fill="url(#gt-bg)"/>
  <text x="320" y="44" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#0f172a">One stack — collect, hold, convert, pay</text>
  <text x="320" y="68" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#6b7280">Partner-enabled rails behind every lane</text>

  <!-- Partner network ring -->
  <ellipse cx="320" cy="268" rx="248" ry="168" stroke="#bbf7d0" stroke-width="2" stroke-dasharray="6 5" fill="none"/>
  <text x="320" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#15803d" letter-spacing="0.06em">PARTNER NETWORK · 130+ CURRENCIES</text>

  <!-- Hub -->
  <rect x="248" y="148" width="144" height="72" rx="16" fill="url(#gt-hub)"/>
  <text x="320" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff">CLETHOS</text>
  <text x="320" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#dcfce7">Treasury access layer</text>

  <!-- Connectors -->
  <path d="M132 220v48M320 220v48M508 220v48" stroke="#16a34a" stroke-width="2.5" marker-end="url(#gt-arrow)"/>

  <!-- Collect -->
  <rect x="48" y="268" width="168" height="168" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="88" cy="308" r="22" fill="#dcfce7"/>
  <path d="M82 308h12M88 302v12" stroke="#15803d" stroke-width="2.5" stroke-linecap="round"/>
  <text x="132" y="312" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Collect</text>
  <text x="72" y="344" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Local &amp; global receivables</text>
  <text x="72" y="364" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Named multi-currency accounts</text>
  <text x="72" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Reconcile in one view</text>
  <rect x="72" y="400" width="120" height="24" rx="6" fill="#f0fdf4"/>
  <text x="84" y="416" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#15803d">30+ account currencies</text>

  <!-- Treasury (highlighted) -->
  <rect x="236" y="268" width="168" height="168" rx="16" fill="#fff" stroke="#22c55e" stroke-width="3"/>
  <circle cx="276" cy="308" r="22" fill="#22c55e"/>
  <path d="M268 308h16M276 300v16" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="276" cy="308" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="320" y="312" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#15803d">Treasury</text>
  <text x="260" y="344" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">FX &amp; conversion timing</text>
  <text x="260" y="364" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Fiat + stablecoin balances</text>
  <text x="260" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Internal treasury moves</text>
  <rect x="260" y="400" width="120" height="24" rx="6" fill="#dcfce7"/>
  <text x="272" y="416" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#15803d">130+ currency pairs</text>

  <!-- Pay -->
  <rect x="424" y="268" width="168" height="168" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="464" cy="308" r="22" fill="#dcfce7"/>
  <path d="M456 312l8-8 8 8" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="464" y1="312" x2="464" y2="318" stroke="#15803d" stroke-width="2.5" stroke-linecap="round"/>
  <text x="508" y="312" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Pay</text>
  <text x="448" y="344" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Supplier &amp; payroll payouts</text>
  <text x="448" y="364" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">Cross-border settlement</text>
  <text x="448" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">API or dashboard execution</text>
  <rect x="448" y="400" width="120" height="24" rx="6" fill="#f0fdf4"/>
  <text x="460" y="416" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#15803d">Minutes, not days</text>

  <!-- Bottom strip -->
  <rect x="40" y="456" width="560" height="48" rx="12" fill="#0f172a"/>
  <text x="320" y="486" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f8fafc">Visibility across corridors · Competitive FX · Regulated partner custody</text>
</svg>
